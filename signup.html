<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Nexora</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
    <h1>Nexora</h1>
    <p>Create your account</p>
</header>

<section>

<div class="card" style="max-width:400px;margin:auto;">

<h2>Sign Up</h2>

<input type="text" id="signupName" placeholder="Full Name" style="width:100%;padding:10px;margin:10px 0;">

<input type="email" id="signupEmail" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;">

<input type="password" id="signupPassword" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

<button class="btn" onclick="signupUser()">Create Account</button>

<p style="margin-top:15px;">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</section>

<script src="script.js"></script>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBGNI_zvB9DGSZP3qOUsd-QR9_XQaNmFR0",
authDomain: "eazzihub.firebaseapp.com",
projectId: "eazzihub",
storageBucket: "eazzihub.firebasestorage.app",
messagingSenderId: "593581035509",
appId: "1:593581035509:web:a7f59ad9d58056d2631abc"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.signupUser = async function(){

const email = document.getElementById("signupEmail").value;

const password = document.getElementById("signupPassword").value;

if(email==="" || password===""){
alert("Please enter your email and password.");
return;
}

try{

await createUserWithEmailAndPassword(auth,email,password);

alert("Account created successfully!");

window.location.href="login.html";

}catch(error){

alert(error.message);

}

}

</script>

</body>
</html>
