
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EazziHub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:35px;
border-radius:15px;
width:90%;
max-width:380px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
color:#4f46e5;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#4338ca;
}

.link{
text-align:center;
margin-top:20px;
}

a{
color:#4f46e5;
text-decoration:none;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>EazziHub</h1>

<p>Welcome Back</p>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<div class="link">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

</div>

</body>
</html>
